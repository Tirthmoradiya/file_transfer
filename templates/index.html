<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer | Secure LAN Sharing</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Transfer</h1>
            <p class="subtitle">Secure high-speed file sharing on your local network</p>
        </header>

        <main>
            <!-- Upload Section -->
            <section class="glass-panel">
                <div id="drop-zone">
                    <div class="upload-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    </div>
                    <div class="drop-text">Drop files here or click to browse</div>
                    <div class="drop-hint">Supports large files with chunked parallel uploads</div>
                    <input type="file" id="file-input" multiple style="display: none;">
                </div>

                <div id="active-uploads">
                    <!-- Progress cards will appear here -->
                </div>
            </section>

            <!-- File List Section -->
            <section class="glass-panel">
                <div class="list-header">
                    <div class="search-box">
                        <span class="search-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        </span>
                        <input type="text" id="search-input" placeholder="Search files...">
                    </div>
                    
                    <div class="controls-group">
                        <select id="sort-select" class="btn btn-ghost">
                            <option value="mtime">Recent First</option>
                            <option value="name">Name</option>
                            <option value="size">Largest First</option>
                        </select>
                        <button id="download-selected-btn" class="btn btn-primary" style="display: none;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            Download Selected
                        </button>
                        <button id="delete-selected-btn" class="btn btn-danger-ghost btn-icon" style="display: none;" title="Delete Selected">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                </div>

                <div id="file-grid" class="file-grid">
                    <!-- File cards will appear here -->
                    <div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 3rem;">
                        Loading files...
                    </div>
                </div>
            </section>
        </main>

        <footer style="text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-top: 2rem;">
            &copy; 2026 Personal File Transfer • Local LAN Only
        </footer>
    </div>

    <div id="toast-container"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
